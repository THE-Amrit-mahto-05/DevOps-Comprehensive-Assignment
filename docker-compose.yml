services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: app
    restart: unless-stopped
    ports:
      - "80:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/appdb
      - PORT=5000
    depends_on:
      - mongo

volumes:
  mongo_data: