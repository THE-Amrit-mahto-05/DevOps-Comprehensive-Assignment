version: '3.8'
services:
 app:
   build:
     context: .
     dockerfile: Dockerfile
   ports:
     - "80:3000"
   environment:
     - MONGO_URI=mongodb://mongodb:27017/users
     - PORT=3000
   depends_on:
     - mongodb
   networks:
     - app-network
 mongodb:
   image: mongo:latest
   ports:
     - "27017:27017"
   volumes:
     - mongo-data:/data/db
   networks:
     - app-network
networks:
 app-network:
   driver: bridge
volumes:
 mongo-data:









